server:
  port: 8080

spring:
  application:
    name: snrms-backend

  # -----------------------------------------------------------------------
  # PostgreSQL DataSource — connects to the "postgres-db" Docker container.
  # Container exposes port 5432 mapped to host port 5432.
  # Database : snrms_db
  # Username : admin
  # Password : 12345
  # -----------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5432/snrms_db
    username: admin
    password: "12345"
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool settings — sensible defaults for development.
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000   # 30 s
      idle-timeout: 600000        # 10 min
      max-lifetime: 1800000       # 30 min
      connection-test-query: SELECT 1

  # ---- JPA / Hibernate configuration ----
  jpa:
    hibernate:
      # 'update' auto-creates / alters tables from @Entity classes.
      # Safe for development; switch to 'validate' for production.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

# ---- Custom JWT settings (read by JwtUtil) ----
app:
  jwt:
    # In production, store this in an environment variable — never commit a real secret.
    secret: "snrms-super-secret-key-change-this-in-production-min-32-chars"
    expiration-ms: 86400000   # 24 hours

  cors:
    allowed-origins: "http://localhost:5173,http://localhost:5174"
