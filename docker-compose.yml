version: "3.8"

services:

  # -----------------------------------------------------------------------
  # PostgreSQL — the primary database for SNRMS.
  # Container name  : postgres-db   (matches your Spring Boot datasource URL)
  # Database        : snrms_db
  # Username        : admin
  # Password        : 12345
  # Host port       : 5432  →  Container port : 5432
  # -----------------------------------------------------------------------
  postgres-db:
    container_name: postgres-db
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "12345"
      POSTGRES_DB: snrms_db
    ports:
      - "5432:5432"
    volumes:
      - snrms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d snrms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # pgAdmin 4 — web UI to inspect/query snrms_db.
  # URL: http://localhost:6060
  # Login: admin@snrms.gov.so / Admin@123
  # -----------------------------------------------------------------------
  pgadmin:
    container_name: pgadmin4_snrms
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@snrms.gov.so
      PGADMIN_DEFAULT_PASSWORD: Admin@123
    ports:
      - "6060:80"
    depends_on:
      postgres-db:
        condition: service_healthy

volumes:
  snrms_pgdata: