version: "3.8"
services:
  postgres:
    container_name: postgres_somali_JPA
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: somaliDb
    ports:
      - "5433:5432"

  pgadmin:
    container_name: pgadmin4_somali_JPA
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: Kabaajlj@gmail.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "6060:80"